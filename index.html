                    detail: '我是蘇予真，《晨光日報》的記者。最近這幾起連續命案發生後，我一直在追這條新聞。因為我發現，所有死者之間，都隱約指向同一件十年前的舊案。而那件舊案的受害者，是我的學妹──Claire。她剛進高中的時候，是校刊社的新生，我是當時的社長。Claire很安靜，不太會主動跟別人聊天，但每次社課結束，她都會留下來幫忙收器材、整理相機。有時候，她會拿著自己拍的照片跑來找我，問我構圖好不好、標題要怎麼下。她曾經跟我說，她以後也想當記者。她說，記者可以把大家不知道的事情寫出來，這樣就不會有人被誤會了。我一直記得那句話。可是後來，她越來越少來社團。以前她總是第一個到，後來開始常常請假、遲到，甚至一整個星期都沒有出現。有一次，我在樓梯間遇到她。她低著頭，制服有點髒，手腕上還有幾塊瘀青。我問她是不是發生什麼事了。她愣了一下，然後對我笑了一下。「學姐，我沒事。」她說得很自然，自然到我真的相信了。我以為她只是心情不好，只要再過幾天就會恢復以前的樣子。結果，那是我最後一次跟她好好說話。Claire離開之後，警方很快就以「意外」結案。學校不再提起這件事，同學也慢慢不再討論，好像只要時間夠久，一切就真的沒有發生過。可是我一直覺得不對。如果真的只是意外，為什麼有人不願意受訪？為什麼有人突然搬家？為什麼有些資料莫名其妙消失了？又為什麼，每當我問到關鍵的地方，總有人要我「不要再查了」。所以我成了記者。不是因為我想寫一篇轟動的獨家。而是因為我一直放不下那句「學姐，我沒事。」這十年來，我調閱過舊新聞、警方紀錄、醫療資料，訪問過當年的老師、同學，也重新找到那些曾經和Claire有交集的人。我把所有找到的線索一張一張貼在人物關係圖上，只希望有一天，能把當年缺失的那一塊拼回來。很多人勸我放棄。他們說，事情都過了十年，查出來又能改變什麼？或許真的改變不了什麼。但至少，我不希望她的人生，最後只剩下警方檔案上的四個字「意外身亡。」我相信，每一個真相都值得被看見。而這一次，我不會再讓她一個人。'

            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultList = document.getElementById('resultList');
            const resultCount = document.getElementById('resultCount');

            function renderResults(query) {
                const trimmed = query.trim().toLowerCase();
                let filtered = [];

                if (trimmed === '') {
                    resultList.innerHTML = `<div class="no-result">輸入關鍵字以搜尋 BOOBME</div>`;
                    resultCount.textContent = '';
                    return;
                }

                filtered = DATA.filter(item => {
                    return item.title.toLowerCase().includes(trimmed);
                });

                if (filtered.length === 0) {
                    resultList.innerHTML = `<div class="no-result">找不到與「${query}」相關的結果。</div>`;
                    resultCount.textContent = '約 0 項結果';
                    return;
                }

                resultCount.textContent = `約 ${filtered.length} 項結果`;

                let html = '';
                filtered.forEach(item => {
                    let titleDisplay = item.title;
                    let snippetDisplay = item.snippet;
                    if (trimmed.length > 0) {
                        const regex = new RegExp(`(${trimmed.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                        titleDisplay = titleDisplay.replace(regex, '<em>$1</em>');
                        snippetDisplay = snippetDisplay.replace(regex, '<em>$1</em>');
                    }

                    const detailEncoded = encodeURIComponent(item.detail);
                    const hasAudio = item.hasAudio || false;
                    const audioSrc = item.audioSrc || '';

                    let audioHtml = '';
                    if (hasAudio && audioSrc) {
                        audioHtml = `
                            <div class="audio-player">
                                <audio controls>
                                    <source src="${audioSrc}" type="audio/mpeg">
                                    您的瀏覽器不支援音頻播放。
                                </audio>
                            </div>
                        `;
                    }

                    html += `
                        <div class="result-item">
                            <div class="result-title"><a href="#" data-detail="${detailEncoded}" data-title="${item.title}" class="result-link-click">${titleDisplay}</a></div>
                            <div class="result-link">${item.link}</div>
                            <div class="result-snippet">${snippetDisplay}</div>
                            ${audioHtml}
                        </div>
                    `;
                });

                resultList.innerHTML = html;

                document.querySelectorAll('.result-link-click').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const detail = decodeURIComponent(this.dataset.detail);
                        const title = this.dataset.title;
                        const newWindow = window.open('', '_blank');
                        if (newWindow) {
                            newWindow.document.write(`
                                <html>
                                <head>
                                    <title>${title}</title>
                                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                    <style>
                                        body {
                                            font-family: Arial, Helvetica, sans-serif;
                                            max-width: 800px;
                                            margin: 30px auto;
                                            padding: 20px 24px;
                                            line-height: 1.9;
                                            color: #1a1a1a;
                                            background: #fafafa;
                                            border-radius: 12px;
                                            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
                                        }
                                        h1 {
                                            font-size: 28px;
                                            font-weight: 600;
                                            color: #202124;
                                            margin-bottom: 20px;
                                            line-height: 1.3;
                                            border-bottom: 2px solid #e8eaed;
                                            padding-bottom: 14px;
                                        }
                                        p {
                                            font-size: 18px;
                                            line-height: 1.9;
                                            margin-bottom: 18px;
                                            color: #2d2d2d;
                                        }
                                        .close-link {
                                            display: inline-block;
                                            margin-top: 28px;
                                            padding: 10px 22px;
                                            background: #f1f3f4;
                                            border-radius: 24px;
                                            color: #1a0dab;
                                            text-decoration: none;
                                            font-size: 16px;
                                            font-weight: 500;
                                            transition: background 0.2s;
                                        }
                                        .close-link:hover {
                                            background: #e8eaed;
                                        }
                                        @media (max-width: 600px) {
                                            body {
                                                padding: 16px 18px;
                                                margin: 12px 10px;
                                            }
                                            h1 {
                                                font-size: 24px;
                                            }
                                            p {
                                                font-size: 18px;
                                                line-height: 1.8;
                                            }
                                        }
                                    </style>
                                </head>
                                <body>
                                    <h1>${title}</h1>
                                    <p>${detail}</p>
                                    <p><a href="#" onclick="window.close();" class="close-link">✕ 關閉此頁</a></p>
                                </body>
                                </html>
                            `);
                            newWindow.document.close();
                        } else {
                            alert('請允許彈出視窗，以查看詳細內容。');
                        }
                    });
                });
            }

            function performSearch() {
                const query = searchInput.value;
                renderResults(query);
            }

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });
            searchInput.addEventListener('input', () => {
                const val = searchInput.value;
                if (val === '') {
                    renderResults('');
                }
            });

            renderResults('');
        })();
    </script>
